<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker</title>


    <!-- tailwindcss + daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fontawesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- custom css -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-[#f8fafc] space-y-[60px] ">


    <!-- header section  -->
    <header>
        <div class="navbar bg-base-100 shadow-sm pl-10 pr-10">
            <div class="flex-1 ">
                <a class="btn btn-ghost text-2xl font-semibold ">
                    
                    <div class="w-6"><img src="./assets/github-logo.png" alt=""></div>
                    
                    GitHub Issues Tracker</a>
            </div>

            <div class="flex items-center space-x-4">
                <div class="flex items-center gap-2 border pl-3 border-gray-300 rounded-lg focus-within:ring-1">
                    <i class="fas fa-search text-[#64748B]"></i>
                    <input type="search" placeholder="Search issues..."
                        class="input border-none outline-none bg-transparent ring-0  w-full max-w-xs" id="search">
                </div>

                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>Primary</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto space-y-6">

        <!-- tab section  -->
        <section class="tab-btn bg-white flex items-center p-6 rounded-lg shadow-sm gap-2">

            <button class="btn btn-primary ">All</button>
            <button class="btn btn-outline">Open</button>
            <button class="btn btn-outline">Closed</button>

        </section>

        <!-- issue section -->
        <section>

            <!-- issu tracking section  -->
            <section class="flex items-center bg-white p-6 rounded-lg shadow-sm gap-2">

                <!-- issue tracking left -->
                <div class="flex items-center gap-2">
                    <div class="bg-[#ECE4FF] rounded-full p-2"><img src="./assets/Aperture.png" alt=""></div>

                    <div>
                        <h2 class="font-semibold text-xl">50 Issues</h2>
                        <p class="text-[#64748b]">Track and manage your project issues</p>
                    </div>

                </div>

                <!-- issue tracking right -->
                <div class="flex items-center gap-4 ml-auto">

                    <!-- open status -->
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-[#00A96E]"></div>
                        <p class="font-medium ">Open</p>
                    </div>

                    <!-- closed status -->
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-[#A855F7]"></div>
                        <p class="font-medium ">Closed</p>
                    </div>
                </div>
            </section>
        </section>
    </main>


    <script src="./app/script.js"></script>
</body>

</html>
