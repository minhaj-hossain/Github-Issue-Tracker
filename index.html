<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker</title>


    <!-- tailwindcss + daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fontawesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- custom css -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body class="container mx-auto flex items-center justify-center min-h-screen py-[100px]">

    <main class="space-y-6 shadow-[0_5px_10px_0_rgba(0,0,0,0.08)] bg-white p-8">

        <!-- header part -->
        <section class="flex flex-col justify-center items-center space-y-6">
            <div><img src="./assets/github-logo.png" alt=""></div>
            <div class="text-center space-y-1 ">
                <h1 class="font-semibold text-2xl">GitHub Issues Tracker</h1>
                <p class="text-[#64748b]">Sign in to manage your issues</p>
            </div>
        </section>


        <!-- input field  -->
        <fieldset class="fieldset w-xs  ">
            <!-- <legend class="fieldset-legend">Login</legend> -->

            <label class="label font-medium text-black">Username</label>
            <input id="user-name" type="text" class="input text-[#64748b] border-[#e4e4e7]" value="admin"
                placeholder="Enter Username" />
            <p class="text-[#4a00ff] text-[12px] mb-4">Default: admin</p>

            <label class="label font-medium text-black">Password</label>
            <input id="password" value="admin123" type="password" class="input text-[#64748b] border border-[#e4e4e7]"
                placeholder="Enter Password" />
            <p class="text-[#4a00ff] text-[12px]">Default: admin123</p>

            <button onclick="loadPage()" class="btn btn-primary text-white mt-4">Sign In</button>
        </fieldset>


        <!-- line part -->
        <div class="flex items-center justify-center space-x-2">
            <div class="line left-line"></div>
            <p>OR</p>
            <div class=" line right-line"></div>
        </div>

        <section class="text-center space-y-2">
            <h3 class="text-[14px] text-[#64748b]">Demo Credentials:</h3>
            <div class="p-6 bg-[#f8fafc] rounded-lg">
                <p><span class="font-semibold">Username:</span> admin</p>
                <p><span class="font-semibold">Password:</span> admin123</p>
            </div>
        </section>

    </main>


    <script src="./app/script.js"></script>
</body>

</html>
